<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Dokumen PT</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<header>

<div class="logo-area">

<img src="assets/logo.png" alt="Logo PT">

<div>
<h1>Sistem Dokumen PT</h1>
<p>Dashboard Monitoring Dokumen</p>
</div>

</div>

</header>

<div class="container">

<div class="stats-container">

<div class="card stat-card">

<h3>Total Dokumen</h3>

<h1 id="totalDokumen">0</h1>

</div>

</div>

<div class="card">

<h2>Pencarian Dokumen</h2>

<input
type="text"
id="cariDepartemen"
placeholder="Cari Lokasi Departemen..."
onkeyup="filterData()">

<input
type="text"
id="cariKeperluan"
placeholder="Cari Keperluan..."
onkeyup="filterData()">

<div class="button-group">

<a href="form.html">
<button>
+ Input Dokumen
</button>
</a>

<button onclick="cetakPDF()">
Cetak PDF
</button>

</div>

</div>

<div class="card">

<h2>Data Dokumen</h2>

<div class="table-wrapper">

<table>

<thead>

<tr>
<th>No</th>
<th>No Dokumen</th>
<th>Tanggal Masuk</th>
<th>Departemen</th>
<th>Diajukan Oleh</th>
<th>Tanggal Dokumen</th>
<th>Keperluan</th>
<th>Nominal</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="dataDokumen">

</tbody>

</table>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
